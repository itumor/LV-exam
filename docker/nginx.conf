server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    include /etc/nginx/mime.types;
    types {
        text/markdown md markdown;
    }

    location = / {
        return 302 /latvian-a2-exam-app/;
    }

    location /latvian-a2-exam-app/ {
        try_files $uri $uri/ /latvian-a2-exam-app/index.html;
    }

    location /codex/ {
        try_files $uri =404;
    }

    location ~* \.(md|json)$ {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|mp3)$ {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }
}

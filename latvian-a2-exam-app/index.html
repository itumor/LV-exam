<!doctype html>
<html lang="lv" data-bs-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Latvian A2 Exam Simulator</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23146b63'/%3E%3Ctext x='32' y='40' text-anchor='middle' font-size='24' font-family='Georgia' font-weight='700' fill='white'%3EA2%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="bg-body-tertiary">
    <header class="exam-appbar navbar">
      <div class="exam-appbar-inner container-xxl">
        <div class="exam-brand-title">A2 Valsts valodas pārbaudes simulators</div>
        <nav id="global-part-nav" class="exam-part-nav nav nav-pills" aria-label="Exam parts"></nav>
        <div class="exam-appbar-status">
          <span class="timer-icon" aria-hidden="true"></span>
          <span id="topbar-timer" class="topbar-timer">25:00</span>
          <span class="profile-icon" aria-hidden="true"></span>
        </div>
      </div>
    </header>
    <div class="exam-progress-track" aria-hidden="true">
      <span id="exam-progress-fill"></span>
    </div>

    <div class="app-shell">
      <aside class="sidebar exam-tools">
        <div class="brand">
          <div class="brand-mark">A2</div>
          <div>
            <h1>Latvian A2 Exam Simulator</h1>
            <p>Learner exam runner</p>
          </div>
        </div>

        <form id="exam-form" class="control-stack row g-3 align-items-end">
          <label class="form-label">
            Exam
            <select id="exam-select" class="form-select" name="exam"></select>
          </label>
          <label class="form-label">
            Source Markdown
            <input id="source-path" class="form-control" name="source-path" readonly>
          </label>
        </form>

        <div class="score-card">
          <div>
            <span>Total</span>
            <strong id="total-points">60</strong>
          </div>
          <div>
            <span>Pass</span>
            <strong>9/15 each</strong>
          </div>
        </div>

        <nav class="nav-list" aria-label="Exam sections">
          <button class="btn btn-outline-primary" data-view="dashboard">Dashboard</button>
          <button class="btn btn-outline-primary" data-view="admin">Admin</button>
          <button class="btn btn-outline-primary" data-view="auth">Account</button>
          <button class="btn btn-outline-primary active" data-view="runner">Runner</button>
          <button class="btn btn-outline-primary" data-view="submission">Submission</button>
          <button class="btn btn-outline-primary" data-view="billing">Billing</button>
          <button class="btn btn-outline-primary" data-view="markdown">Markdown</button>
          <button class="btn btn-outline-primary" data-view="json">JSON</button>
          <button class="btn btn-outline-primary" data-view="tts">TTS</button>
          <button class="btn btn-outline-primary" data-view="prompts">Images</button>
          <button class="btn btn-outline-primary" data-view="quality">Quality</button>
        </nav>

        <div class="button-grid">
          <button id="reload-exam" class="btn btn-outline-primary" type="button">Reload</button>
          <button id="submit-exam" class="btn btn-primary" type="button">Submit Answers</button>
          <button id="evaluate-submission" class="btn btn-primary" type="button">AI Score</button>
          <button id="copy-submission" class="btn btn-outline-primary" type="button">Copy Submission</button>
          <button id="download-submission" class="btn btn-outline-primary" type="button">Save Submission</button>
          <button id="copy-markdown" class="btn btn-outline-primary" type="button" data-debug-control="true">Copy Markdown</button>
          <button id="copy-json" class="btn btn-outline-primary" type="button" data-debug-control="true">Copy JSON</button>
          <button id="download-markdown" class="btn btn-outline-primary" type="button" data-debug-control="true">Save .md</button>
          <button id="download-json" class="btn btn-outline-primary" type="button" data-debug-control="true">Save .json</button>
        </div>
      </aside>

      <main class="workspace">
        <header class="workspace-bar">
          <div>
            <span class="eyebrow">Practice exam runner</span>
            <h2 id="workspace-title">Generated Exam</h2>
          </div>
          <div id="validation-pill" class="validation-pill">Validated</div>
        </header>

        <section id="auth-view" class="view">
          <div id="auth-output"></div>
        </section>

        <section id="dashboard-view" class="view">
          <div id="dashboard-output"></div>
        </section>

        <section id="admin-view" class="view">
          <div id="admin-output"></div>
        </section>

        <section id="runner-view" class="view active">
          <div id="runner-output" class="exam-runner"></div>
        </section>

        <section id="submission-view" class="view">
          <div id="submission-output" class="submission-panel"></div>
        </section>

        <section id="billing-view" class="view">
          <div id="billing-output" class="billing-panel"></div>
        </section>

        <section id="exam-view" class="view">
          <div id="exam-output" class="document"></div>
        </section>

        <section id="markdown-view" class="view">
          <pre id="markdown-output" class="code-panel"></pre>
        </section>

        <section id="json-view" class="view">
          <pre id="json-output" class="code-panel"></pre>
        </section>

        <section id="tts-view" class="view">
          <div id="tts-output" class="document compact"></div>
        </section>

        <section id="prompts-view" class="view">
          <div id="prompt-output" class="prompt-grid"></div>
        </section>

        <section id="quality-view" class="view">
          <div id="quality-output" class="quality-grid"></div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast shadow-sm" role="status" aria-live="polite"></div>
    <script src="flow-core.js"></script>
    <script src="app.js"></script>
  </body>
</html>

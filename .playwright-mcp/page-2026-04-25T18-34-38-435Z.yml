              - article [ref=e448]:
                - generic [ref=e449]:
                  - heading "1. uzdevums" [level=5] [ref=e450]
                  - paragraph [ref=e451]: Lasiet tekstu un atzīmējiet, kurš apgalvojums ir pareizs!
                  - paragraph [ref=e452]:
                    - strong [ref=e453]: Teksts 1
                  - paragraph [ref=e454]: Rīgas Pieaugušo izglītības centrā septembrī sākas jauns latviešu valodas kurss iesācējiem. Nodarbības būs pirmdienās un trešdienās no 18.00 līdz 19.30. Grupā būs ne vairāk kā divpadsmit dalībnieki. Pirmajā dienā skolotāja pastāstīs par mācību plānu un iedos uzdevumus mājām. Kursa maksa ir 40 eiro mēnesī. Pieteikties var līdz 25. augustam centra mājaslapā vai pa telefonu. Kursos mācīsies cilvēki, kuri dzīvo un strādā Rīgā. Pēc katras nodarbības skolotāja atbildēs arī uz jautājumiem. Tāpēc šī informācija var palīdzēt cilvēkiem iepriekš saplānot dienu, paņemt visas vajadzīgās lietas līdzi, atrast pareizo vietu, laiku un bez steigas izdarīt svarīgo.
                  - list [ref=e455]:
                    - listitem [ref=e456]: a) Kurss notiks katru darba dienu.
                    - listitem [ref=e457]: b) Grupā būs līdz divpadsmit cilvēkiem.
                    - listitem [ref=e458]: c) Pieteikties var tikai klātienē.
                  - paragraph [ref=e459]:
                    - strong [ref=e460]: Teksts 2
                  - paragraph [ref=e461]: Sveika, skolotāj! Rīt nevarēšu ierasties uz nodarbību, jo man darbā ir svarīga tikšanās ar klientu. Mājasdarbu izpildīšu vakarā un nosūtīšu jums e-pastā līdz pulksten deviņiem. Vai jūs varat man atsūtīt arī jaunā teksta fotogrāfiju? Nākamajā stundā es noteikti būšu. Ar cieņu, Deniss. Man ir žēl, ka kavēšu, jo jaunā tēma man ir svarīga. Ja vajag, es varu sestdien atnākt uz īsu konsultāciju. Tāpēc šī informācija var palīdzēt cilvēkiem iepriekš saplānot dienu, paņemt visas vajadzīgās lietas līdzi, atrast pareizo vietu, laiku un bez steigas izdarīt svarīgo.
                  - list [ref=e462]:
                    - listitem [ref=e463]: a) Deniss rīt nebūs nodarbībā darba dēļ.
                    - listitem [ref=e464]: b) Deniss lūdz pārcelt eksāmenu.
                    - listitem [ref=e465]: c) Skolotāja nevar saņemt e-pastu.
                  - paragraph [ref=e466]:
                    - strong [ref=e467]: Teksts 3
                  - paragraph [ref=e468]: "Darba piedāvājums. Valodu skola meklē administratoru darbam pēcpusdienās. Darba pienākumi: atbildēt uz telefona zvaniem, reģistrēt jaunus kursu dalībniekus, sagatavot mācību telpas un pasūtīt biroja preces. Darba vieta atrodas centrā pie autoostas. Kandidātam jāprot latviešu un krievu valoda, jāspēj lietot datoru un jābūt pieklājīgam. Skola sola apmācību pirmajā darba nedēļā. Reizēm administratoram būs jāpalīdz arī skolotājiem sameklēt materiālus klasēs. Tāpēc šī informācija var palīdzēt cilvēkiem iepriekš saplānot dienu, paņemt visas vajadzīgās lietas līdzi, atrast pareizo vietu, laiku un bez steigas izdarīt svarīgo."
                  - list [ref=e469]:
                    - listitem [ref=e470]: a) Darbinieks strādās no rīta.
                    - listitem [ref=e471]: b) Skola meklē matemātikas skolotāju.
                    - listitem [ref=e472]: c) Darbam vajadzīgas valodu zināšanas un datorprasmes.
                  - paragraph [ref=e473]:
                    - strong [ref=e474]: Teksts 4
                  - paragraph [ref=e475]: Sofija studē ekonomiku un paralēli strādā nelielā kafejnīcā. No rīta viņa apmeklē lekcijas, bet no četriem līdz deviņiem vakarā apkalpo viesus. Brīvdienās Sofija lasa grāmatas angļu valodā un skatās mācību video internetā. Viņa saka, ka valodas ir ļoti svarīgas, jo nākotnē vēlas strādāt starptautiskā uzņēmumā. Lai gan dažreiz ir nogurums, Sofijai patīk gan studijas, gan darbs. Viņa cenšas visu saplānot kalendārā. Draugi saka, ka Sofija ir aktīva un labi organizēta. Tāpēc šī informācija var palīdzēt cilvēkiem iepriekš saplānot dienu, paņemt visas vajadzīgās lietas līdzi, atrast pareizo vietu, laiku un bez steigas izdarīt svarīgo.
                  - list [ref=e476]:
                    - listitem [ref=e477]: a) Sofija strādā slimnīcā.
                    - listitem [ref=e478]: b) Brīvdienās viņa mācās valodas.
                    - listitem [ref=e479]: c) Viņa nevēlas strādāt nākotnē.

                  - heading "Lasītprasmes pārbaude" [level=4] [ref=e237]
                  - paragraph [ref=e238]: Laiks – 30 minūtes
                  - heading "1. uzdevums" [level=5] [ref=e239]
                  - paragraph [ref=e240]: Lasiet tekstu un atzīmējiet, kurš apgalvojums ir pareizs!
                  - paragraph [ref=e241]:
                    - strong [ref=e242]: Teksts 1
                  - paragraph [ref=e243]: Rīgas Pieaugušo izglītības centrā septembrī sākas jauns latviešu valodas kurss iesācējiem. Nodarbības būs pirmdienās un trešdienās no 18.00 līdz 19.30. Grupā būs ne vairāk kā divpadsmit dalībnieki. Pirmajā dienā skolotāja pastāstīs par mācību plānu un iedos uzdevumus mājām. Kursa maksa ir 40 eiro mēnesī. Pieteikties var līdz 25. augustam centra mājaslapā vai pa telefonu. Kursos mācīsies cilvēki, kuri dzīvo un strādā Rīgā. Pēc katras nodarbības skolotāja atbildēs arī uz jautājumiem. Tāpēc šī informācija var palīdzēt cilvēkiem iepriekš saplānot dienu, paņemt visas vajadzīgās lietas līdzi, atrast pareizo vietu, laiku un bez steigas izdarīt svarīgo.
                  - list [ref=e244]:
                    - listitem [ref=e245]: a) Kurss notiks katru darba dienu.
                    - listitem [ref=e246]: b) Grupā būs līdz divpadsmit cilvēkiem.
                    - listitem [ref=e247]: c) Pieteikties var tikai klātienē.
                  - paragraph [ref=e248]:
                    - strong [ref=e249]: Teksts 2
                  - paragraph [ref=e250]: Sveika, skolotāj! Rīt nevarēšu ierasties uz nodarbību, jo man darbā ir svarīga tikšanās ar klientu. Mājasdarbu izpildīšu vakarā un nosūtīšu jums e-pastā līdz pulksten deviņiem. Vai jūs varat man atsūtīt arī jaunā teksta fotogrāfiju? Nākamajā stundā es noteikti būšu. Ar cieņu, Deniss. Man ir žēl, ka kavēšu, jo jaunā tēma man ir svarīga. Ja vajag, es varu sestdien atnākt uz īsu konsultāciju. Tāpēc šī informācija var palīdzēt cilvēkiem iepriekš saplānot dienu, paņemt visas vajadzīgās lietas līdzi, atrast pareizo vietu, laiku un bez steigas izdarīt svarīgo.
                  - list [ref=e251]:
                    - listitem [ref=e252]: a) Deniss rīt nebūs nodarbībā darba dēļ.
                    - listitem [ref=e253]: b) Deniss lūdz pārcelt eksāmenu.
                    - listitem [ref=e254]: c) Skolotāja nevar saņemt e-pastu.
                  - paragraph [ref=e255]:
                    - strong [ref=e256]: Teksts 3
                  - paragraph [ref=e257]: "Darba piedāvājums. Valodu skola meklē administratoru darbam pēcpusdienās. Darba pienākumi: atbildēt uz telefona zvaniem, reģistrēt jaunus kursu dalībniekus, sagatavot mācību telpas un pasūtīt biroja preces. Darba vieta atrodas centrā pie autoostas. Kandidātam jāprot latviešu un krievu valoda, jāspēj lietot datoru un jābūt pieklājīgam. Skola sola apmācību pirmajā darba nedēļā. Reizēm administratoram būs jāpalīdz arī skolotājiem sameklēt materiālus klasēs. Tāpēc šī informācija var palīdzēt cilvēkiem iepriekš saplānot dienu, paņemt visas vajadzīgās lietas līdzi, atrast pareizo vietu, laiku un bez steigas izdarīt svarīgo."
                  - list [ref=e258]:
                    - listitem [ref=e259]: a) Darbinieks strādās no rīta.
                    - listitem [ref=e260]: b) Skola meklē matemātikas skolotāju.
                    - listitem [ref=e261]: c) Darbam vajadzīgas valodu zināšanas un datorprasmes.
                  - paragraph [ref=e262]:
                    - strong [ref=e263]: Teksts 4
                  - paragraph [ref=e264]: Sofija studē ekonomiku un paralēli strādā nelielā kafejnīcā. No rīta viņa apmeklē lekcijas, bet no četriem līdz deviņiem vakarā apkalpo viesus. Brīvdienās Sofija lasa grāmatas angļu valodā un skatās mācību video internetā. Viņa saka, ka valodas ir ļoti svarīgas, jo nākotnē vēlas strādāt starptautiskā uzņēmumā. Lai gan dažreiz ir nogurums, Sofijai patīk gan studijas, gan darbs. Viņa cenšas visu saplānot kalendārā. Draugi saka, ka Sofija ir aktīva un labi organizēta. Tāpēc šī informācija var palīdzēt cilvēkiem iepriekš saplānot dienu, paņemt visas vajadzīgās lietas līdzi, atrast pareizo vietu, laiku un bez steigas izdarīt svarīgo.
                  - list [ref=e265]:
                    - listitem [ref=e266]: a) Sofija strādā slimnīcā.
                    - listitem [ref=e267]: b) Brīvdienās viņa mācās valodas.
                    - listitem [ref=e268]: c) Viņa nevēlas strādāt nākotnē.
                  - heading "2. uzdevums" [level=5] [ref=e269]
                  - paragraph [ref=e270]: Atrodiet, kurš sludinājums (A–L) atbilst katrai situācijai!
                  - paragraph [ref=e271]:
                    - strong [ref=e272]: Situācijas
                  - list [ref=e273]:
                    - listitem [ref=e274]: Pāvels meklē latviešu valodas kursus vakaros.
                    - listitem [ref=e275]: Inesei vajag istabu kopmītnēs pie universitātes.
                    - listitem [ref=e276]: Samirai vajag lētu vārdnīcu angļu valodā.
                    - listitem [ref=e277]: Dāvim vajag vietu, kur izdrukāt CV.
                    - listitem [ref=e278]: Laurai vajag prakses vietu birojā.
                    - listitem [ref=e279]: Nikam vajag lietotu portatīvo datoru mācībām.
                  - paragraph [ref=e280]:
                    - strong [ref=e281]: Sludinājumi
                  - list [ref=e282]:
                    - listitem [ref=e283]: A. Vakara latviešu valodas kursi otrdienās un ceturtdienās no 18.30.
                    - listitem [ref=e284]: B. Studentu kopmītnēs izīrē vienvietīgu istabu pie Latvijas Universitātes.
                    - listitem [ref=e285]: C. Grāmatnīcā atlaide angļu un vācu vārdnīcām.
                    - listitem [ref=e286]: D. Kopēšanas centrā drukā CV, diplomdarbus un plakātus.
                    - listitem [ref=e287]: E. Birojs meklē praktikantu dokumentu sakārtošanai.
                    - listitem [ref=e288]: F. Pārdod lietotu portatīvo datoru labā stāvoklī.
                    - listitem [ref=e289]: G. Sporta klubā atlaide studentiem.
                    - listitem [ref=e290]: H. Kafejnīca meklē pavāra palīgu.
                    - listitem [ref=e291]: I. Frizētava pieņem klientus bez pieraksta.
                    - listitem [ref=e292]: J. Pārdod velosipēdu ar grozu.
                    - listitem [ref=e293]: K. Mūzikas skola uzņem jaunus audzēkņus.
                    - listitem [ref=e294]: L. Izīrē dzīvokli ģimenei pie bērnudārza.

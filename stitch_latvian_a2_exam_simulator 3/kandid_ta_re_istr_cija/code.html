<!DOCTYPE html>

<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col justify-center items-center p-gutter">
<!-- Top Navigation Omitted for Transactional/Login Screen as per guidelines -->
<!-- Main Content Container -->
<main class="w-full max-w-[480px] mx-auto">
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded p-stack-lg flex flex-col gap-stack-lg">
<!-- Header / Authority Identity -->
<div class="flex flex-col items-center text-center gap-stack-md">
<span class="material-symbols-outlined text-primary text-[48px]" style="font-variation-settings: 'FILL' 1;">
                    account_balance
                </span>
<div>
<h1 class="font-headline-md text-headline-md text-primary mb-stack-sm">Kandidāta reģistrācija</h1>
<p class="font-body-md text-body-md text-on-surface-variant">A2 Valsts valodas pārbaudes simulators</p>
</div>
</div>
<hr class="border-outline-variant w-full"/>
<!-- Form -->
<form class="flex flex-col gap-stack-md">
<!-- Kandidāta kods -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-bold text-label-bold text-on-surface" for="candidate-code">Kandidāta kods</label>
<input aria-required="true" class="w-full bg-surface-container-lowest border border-outline rounded px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary focus:border-[2px] transition-all" id="candidate-code" name="candidate-code" required="" type="text"/>
</div>
<!-- Vārds -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-bold text-label-bold text-on-surface" for="first-name">Vārds</label>
<input aria-required="true" class="w-full bg-surface-container-lowest border border-outline rounded px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary focus:border-[2px] transition-all" id="first-name" name="first-name" required="" type="text"/>
</div>
<!-- Uzvārds -->
<div class="flex flex-col gap-stack-sm">
<label class="font-label-bold text-label-bold text-on-surface" for="last-name">Uzvārds</label>
<input aria-required="true" class="w-full bg-surface-container-lowest border border-outline rounded px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary focus:border-[2px] transition-all" id="last-name" name="last-name" required="" type="text"/>
</div>
<!-- Action Area -->
<div class="mt-stack-md">
<button class="w-full bg-[#16a34a] hover:bg-[#15803d] text-on-primary font-label-bold text-label-bold rounded py-4 px-6 flex justify-center items-center gap-2 transition-colors" type="submit">
<span>Sākt pārbaudi</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">
                            arrow_forward
                        </span>
</button>
</div>
</form>
</div>
<!-- Footer / Help Text -->
<div class="mt-stack-md text-center">
<p class="font-label-sm text-label-sm text-on-surface-variant">
                Lūdzu, ievadiet datus tieši tā, kā norādīts jūsu eksāmena lapā.
            </p>
</div>
</main>
</body></html>

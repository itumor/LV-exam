services:
  latvian-a2-exam-app:
    build:
      context: .
    image: lvcodex/latvian-a2-exam-app:local
    environment:
      PORT: "80"
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      LLM_MODEL: ${LLM_MODEL:-llama-3.3-70b-versatile}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      CODEX_REMOTE_URL: ${CODEX_REMOTE_URL:-}
      CODEX_MODEL: ${CODEX_MODEL:-gpt-5.2}
      CODEX_PROFILE: ${CODEX_PROFILE:-}
      CODEX_OSS: ${CODEX_OSS:-false}
      CODEX_LOCAL_PROVIDER: ${CODEX_LOCAL_PROVIDER:-}
      CODEX_TIMEOUT_SECONDS: ${CODEX_TIMEOUT_SECONDS:-300}
      EVALUATE_RATE_LIMIT_PER_MINUTE: ${EVALUATE_RATE_LIMIT_PER_MINUTE:-20}
      EVALUATE_RATE_LIMIT_WINDOW_SECONDS: ${EVALUATE_RATE_LIMIT_WINDOW_SECONDS:-60}
      AUTH_DB_PATH: ${AUTH_DB_PATH:-/app/.multica/auth.sqlite3}
      AUTH_WEBHOOK_SECRET: ${AUTH_WEBHOOK_SECRET:-}
      BILLING_DB_PATH: ${BILLING_DB_PATH:-/app/data/billing.sqlite3}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_SINGLE_EXAM: ${STRIPE_PRICE_SINGLE_EXAM:-}
      STRIPE_PRICE_EXAM_PACK: ${STRIPE_PRICE_EXAM_PACK:-}
      STRIPE_PRICE_MONTHLY_SUBSCRIPTION: ${STRIPE_PRICE_MONTHLY_SUBSCRIPTION:-}
      STRIPE_PRICE_AI_CREDITS: ${STRIPE_PRICE_AI_CREDITS:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}
      APP_ENV: ${APP_ENV:-production}
      APP_RELEASE: ${APP_RELEASE:-local}
    ports:
      - "${APP_PORT:-4173}:80"
    restart: unless-stopped

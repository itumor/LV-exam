<!doctype html>
<html lang="lv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Latvian Listening Library</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">LV</span>
          <div>
            <h1>Klausīšanās</h1>
            <p>A1 / A2 audio library</p>
          </div>
        </div>
        <label class="search-label" for="search">Meklēt</label>
        <input id="search" type="search" placeholder="Search by file or text..." autocomplete="off" />
        <nav id="menu" class="menu" aria-label="Audio lessons"></nav>
      </aside>

      <main class="reader">
        <section class="hero">
          <div>
            <p class="eyebrow">Latvian listening course</p>
            <h2 id="title">Select an audio item</h2>
            <p id="subtitle">Browse transcripts and translations generated from the MP3 source files.</p>
          </div>
          <span id="statusBadge" class="badge badge-muted">waiting</span>
        </section>

        <section class="player-card">
          <audio id="audio" controls preload="metadata"></audio>
          <div class="nav-buttons">
            <button id="prev" type="button">Previous</button>
            <button id="next" type="button">Next</button>
          </div>
        </section>

        <section class="content-grid">
          <article class="text-panel">
            <div class="panel-heading">
              <h3>Latvian Transcript</h3>
              <a id="lvLink" href="#" target="_blank" rel="noreferrer">Markdown</a>
            </div>
            <pre id="lvText" class="reading-text">No transcript selected.</pre>
          </article>
          <article class="text-panel">
            <div class="panel-heading">
              <h3>English Translation</h3>
              <a id="enLink" href="#" target="_blank" rel="noreferrer">Markdown</a>
            </div>
            <pre id="enText" class="reading-text">No translation selected.</pre>
          </article>
        </section>
      </main>
    </div>

    <button id="communityToggle" type="button" class="community-toggle" aria-label="Open community panel" title="Community">💬</button>

    <aside id="communityPanel" class="community-panel" aria-label="Community discussion">
      <div class="community-header">
        <h3>Community</h3>
        <button id="communityClose" type="button" class="panel-close" aria-label="Close panel">×</button>
      </div>
      <div class="community-tabs">
        <button type="button" data-tab="questions" class="tab active">Questions</button>
        <button type="button" data-tab="comments" class="tab">Comments</button>
        <button type="button" data-tab="translations" class="tab">Translations</button>
      </div>
      <div class="community-form">
        <select id="entryType">
          <option value="question">Question</option>
          <option value="comment">Comment</option>
          <option value="translation_suggestion">Translation suggestion</option>
        </select>
        <input id="authorName" type="text" placeholder="Your name" maxlength="50" />
        <textarea id="entryBody" placeholder="Share your thoughts..." maxlength="500"></textarea>
        <button id="submitEntry" type="button">Add</button>
      </div>
      <div class="community-sort">
        <label>Sort by:</label>
        <select id="sortOrder">
          <option value="newest">Newest</option>
          <option value="helpful">Most Helpful</option>
        </select>
      </div>
      <div id="communityList" class="community-list"></div>
    </aside>

    <script src="app.js"></script>
  </body>
</html>

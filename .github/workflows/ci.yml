name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

env:
  FLY_APP: latvian-a2-exam
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  regression:
    name: Regression suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run regression suite
        run: npm test

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: regression
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: production
      url: https://latvian-a2-exam.fly.dev
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install flyctl
        run: |
          curl -L https://fly.io/install.sh | sh
          echo "$HOME/.fly/bin" >> $GITHUB_PATH

      - name: Set Fly secrets
        run: |
          flyctl secrets set \
            LLM_PROVIDER="${LLM_PROVIDER:-groq}" \
            LLM_MODEL="${LLM_MODEL:-llama-3.3-70b-versatile}" \
            --app ${{ env.FLY_APP }}
        env:
          LLM_PROVIDER: groq
          LLM_MODEL: llama-3.3-70b-versatile
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Deploy
        run: flyctl deploy --app ${{ env.FLY_APP }} --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deployment
        run: |
          sleep 5
          curl -sf --retry 5 --retry-delay 5 --retry-connrefused https://latvian-a2-exam.fly.dev/healthz
